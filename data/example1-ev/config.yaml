#
datasets:
  default:
    filename: data/example1-ev/dataset.jsonl
  default_lite:
    filename: data/example1-ev/dataset.lite.jsonl

data_schemas:
  default:
    # Definition of the expected structured data format (JSON Schema)
    type: object
    properties:
      battery_capacity:
        type:
          - number
          - "null"
      charging_ac:
        type:
          - number
          - "null"
      charging_dc:
        type:
          - number
          - "null"
      power:
        type:
          - number
          - "null"
      range:
        type:
          - number
          - "null"
#      useless_field:
#        type:
#          - string
#          - "null"
    required:
      - battery_capacity
      - charging_ac
      - charging_dc
      - power
      - range
#      - useless_field

document_sets:
  html:
    filename: data/example1-ev/documents/doc.html.jsonl
  wikitext:
    filename: data/example1-ev/documents/doc.wikitext.jsonl

prompts:
  default:
    template:
      filename: data/example1-ev/PROMPT.default.md
      variables: # unused...
        - doc_language
        - doc_content
        - full_model_name
        - configuration_name
        - country_name
        - year

models:
  deepseek-r1:
    backend: ollama_ollama
    name: deepseek-r1:8b-llama-distill-q4_K_M
    options:
      temperature: temperature
      max_predict_tokens: num_predict
      top_p: top_p
#  deepseek-r1-gpt4all:
#    backend: simonw_llm
#    name: DeepSeek-R1-Distill-Llama-8B-Q4_0
#    options:
#      temperature: temp
#      max_predict_tokens: max_tokens
#      top_p: top_p
  gemma3:
    backend: ollama_ollama
    options:
      temperature: temperature
      max_predict_tokens: num_predict
      top_p: top_p
  gpt-oss:
    backend: ollama_ollama
    name: gpt-oss
    options:
      temperature: temperature
      max_predict_tokens: num_predict
      top_p: top_p

scenarios:
  default:
    name: EV attributes extraction from lite wiki article
    dataset: default_lite
    data_schema: default
    variations:
      document_sets:
#        - html
        - wikitext
      prompts:
        - default
      models:
        - deepseek-r1
#        - gemma3
#        - gpt-oss
      model_options:
        temperature:
#          - 0.1
          - 0.5
#          - 1.0
        top_p:
#          - 0.1
#          - 0.5
          - 0.95
      repeats: 2
